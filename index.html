<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 PadhaiGhar – Online eBook Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --card: #161922;
    --card2: #1e2330;
    --accent: #f5a623;
    --accent2: #e8440a;
    --text: #f0ece4;
    --muted: #7c8499;
    --border: #2a2f3e;
    --green: #27c96a;
    --red: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hind', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo span { font-size: 1.3rem; }

  nav { display: flex; gap: 1rem; align-items: center; }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Hind', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .nav-btn:hover, .nav-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,166,35,0.08);
  }

  .admin-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #000;
    font-weight: 600;
    padding: 0.4rem 1.1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Hind', sans-serif;
    font-size: 0.85rem;
    transition: opacity 0.2s;
  }

  .admin-btn:hover { opacity: 0.85; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 3rem;
    text-align: center;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(245,166,35,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 0.8rem;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 500px;
    margin: 0 auto 1.8rem;
    font-weight: 300;
  }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.8rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Hind', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }

  /* ── FILTER TABS ── */
  .filters {
    position: relative;
    z-index: 1;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .filter-tag {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.3rem 0.85rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Hind', sans-serif;
  }

  .filter-tag:hover, .filter-tag.active {
    background: rgba(245,166,35,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── STATS BAR ── */
  .stats {
    position: relative;
    z-index: 1;
    padding: 0 2rem 1.2rem;
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* ── BOOK GRID ── */
  .grid {
    position: relative;
    z-index: 1;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.4rem;
  }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.4s ease both;
  }

  .book-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(245,166,35,0.15);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-cover {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }

  .book-cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .book-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .book-info {
    padding: 1rem;
  }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.3rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-author {
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }

  .book-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
  }

  .tag {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .read-btn {
    width: 100%;
    padding: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #000;
    font-weight: 600;
    font-family: 'Hind', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .read-btn:hover { opacity: 0.85; }

  /* ── READER MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.open { display: flex; align-items: center; justify-content: center; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 95vw;
    max-width: 1100px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    flex: 1;
  }

  .modal-close {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: var(--red); border-color: var(--red); }

  .modal-body {
    flex: 1;
    overflow: hidden;
  }

  .modal-body iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .iframe-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    color: var(--muted);
  }

  .iframe-placeholder .icon { font-size: 3rem; }

  /* ── ADMIN PANEL ── */
  .admin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
  }

  .admin-overlay.open { display: flex; }

  .admin-modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 95vw;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2rem;
    animation: slideUp 0.3s ease;
  }

  .admin-modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-group { margin-bottom: 1rem; }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
    font-weight: 500;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 0.6rem 0.85rem;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Hind', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group select option { background: var(--card2); }

  .form-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 0.4rem;
    margin-top: 0.4rem;
  }

  .emoji-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem;
    cursor: pointer;
    font-size: 1.1rem;
    text-align: center;
    transition: all 0.15s;
  }

  .emoji-btn:hover, .emoji-btn.selected {
    border-color: var(--accent);
    background: rgba(245,166,35,0.1);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .submit-btn {
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    font-family: 'Hind', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover { opacity: 0.85; }

  .cancel-btn {
    width: 100%;
    padding: 0.65rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Hind', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
  }

  .cancel-btn:hover { border-color: var(--muted); color: var(--text); }

  /* ── BOOK LIST IN ADMIN ── */
  .book-list { margin-top: 1.5rem; }

  .book-list h3 {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .book-list-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.65rem 0.85rem;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    transition: border-color 0.2s;
  }

  .book-list-item:hover { border-color: var(--border); }

  .book-list-emoji { font-size: 1.4rem; }

  .book-list-info { flex: 1; min-width: 0; }

  .book-list-title {
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-list-sub {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .delete-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .delete-btn:hover { background: var(--red); border-color: var(--red); color: #fff; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    padding: 0.65rem 1.4rem;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.88rem;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }

  /* ── COLOR PICKER ── */
  .color-grid {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .color-swatch:hover, .color-swatch.selected {
    border-color: #fff;
    transform: scale(1.15);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 0 1rem 3rem; }
    .hero { padding: 2.5rem 1rem 2rem; }
    .filters { padding: 0 1rem 1.2rem; }
    .admin-modal { padding: 1.4rem; }
    .form-row { grid-template-columns: 1fr; }
    header { padding: 0 1rem; }
    .logo { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>📚</span> PadhaiGhar</div>
  <nav>
    <button class="nav-btn active" onclick="showView('library')">Library</button>
    <button class="nav-btn" onclick="showView('recent')">Recent</button>
    <button class="admin-btn" onclick="openAdmin()">+ Book Add Karo</button>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Apni <em>Study</em> Shuru Karo</h1>
  <p>Sabse badi Hindi eBook library – PDF seedha padhein, koi download zaruri nahi</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Book ya author ka naam likho..." oninput="renderBooks()">
  </div>
</section>

<!-- FILTERS -->
<div class="filters" id="filterBar"></div>

<!-- STATS -->
<div class="stats" id="statsBar"></div>

<!-- GRID -->
<div class="grid" id="bookGrid"></div>

<!-- READER MODAL -->
<div class="modal-overlay" id="readerModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-size:1.6rem" id="readerEmoji">📖</div>
      <div class="modal-title" id="readerTitle">Loading...</div>
      <button class="modal-close" onclick="closeReader()">✕</button>
    </div>
    <div class="modal-body" id="readerBody"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-modal">
    <h2>📖 Nayi Book Add Karo</h2>

    <div class="form-group">
      <label>Book ka Title *</label>
      <input type="text" id="f_title" placeholder="e.g., Vigyan ki Duniya" />
    </div>

    <div class="form-group">
      <label>Author ka Naam</label>
      <input type="text" id="f_author" placeholder="e.g., Dr. A.P.J. Abdul Kalam" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category *</label>
        <select id="f_category">
          <option value="">-- Category Chunein --</option>
          <option>Science</option>
          <option>Mathematics</option>
          <option>History</option>
          <option>Literature</option>
          <option>Geography</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>Biology</option>
          <option>Computer</option>
          <option>Economics</option>
          <option>Political Science</option>
          <option>Motivational</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Class / Level</label>
        <select id="f_level">
          <option value="">-- Level Chunein --</option>
          <option>Class 6</option>
          <option>Class 7</option>
          <option>Class 8</option>
          <option>Class 9</option>
          <option>Class 10</option>
          <option>Class 11</option>
          <option>Class 12</option>
          <option>Competitive</option>
          <option>General</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Google Drive PDF Link *</label>
      <input type="text" id="f_link" placeholder="https://drive.google.com/file/d/FILE_ID/view" />
      <div class="form-hint">💡 Drive file ka "Anyone with link" permission ON karo, phir link paste karo</div>
    </div>

    <div class="form-group">
      <label>Book Cover Emoji Chunein</label>
      <div class="emoji-grid" id="emojiGrid"></div>
      <input type="hidden" id="f_emoji" value="📘">
    </div>

    <div class="form-group">
      <label>Cover Background Color</label>
      <div class="color-grid" id="colorGrid"></div>
      <input type="hidden" id="f_color" value="#1a2a4a">
    </div>

    <div class="form-group">
      <label>Badge Text (Optional)</label>
      <input type="text" id="f_badge" placeholder="e.g., NEW, FREE, NCERT" maxlength="8" />
    </div>

    <button class="submit-btn" onclick="addBook()">📚 Book Publish Karo</button>
    <button class="cancel-btn" onclick="closeAdmin()">Raho Rehne Do</button>

    <div class="book-list">
      <h3>Published Books (<span id="bookCountLabel">0</span>)</h3>
      <div id="adminBookList"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

let books = JSON.parse(localStorage.getItem('padhaiGharBooks') || '[]');

// Default sample books
if (books.length === 0) {
  books = [
    {
      id: 1, title: "NCERT Science Class 10", author: "NCERT",
      category: "Science", level: "Class 10",
      driveId: "1GfQlqmKH-t0F1o8FMPGKCLl_SgDOcq1b",
      emoji: "🔬", color: "#0a2340", badge: "NCERT", addedAt: Date.now() - 86400000*2
    },
    {
      id: 2, title: "Indian History Complete Notes", author: "Spectrum Publications",
      category: "History", level: "Competitive",
      driveId: "1GfQlqmKH-t0F1o8FMPGKCLl_SgDOcq1b",
      emoji: "🏛️", color: "#2a1a0a", badge: "HOT", addedAt: Date.now() - 86400000
    },
    {

      emoji: "📐", color: "#0a2a1a", badge: "FREE", addedAt: Date.now() - 3600000*5
    },
    {
      id: 4, title: "Wings of Fire", author: "A.P.J. Abdul Kalam",
      category: "Motivational", level: "General",
      driveId: "1GfQlqmKH-t0F1o8FMPGKCLl_SgDOcq1b",
      emoji: "🚀", color: "#1a0a2a", badge: "NEW", addedAt: Date.now()
    },
    {
      id: 5, title: "Physics Wallah Notes", author: "Alakh Pandey",
      category: "Physics", level: "Class 11",
      driveId: "1GfQlqmKH-t0F1o8FMPGKCLl_SgDOcq1b",
      emoji: "⚛️", color: "#2a2a0a", badge: "", addedAt: Date.now() - 3600000*2
    },
    {
      id: 6, title: "Computer Science Basics", author: "Sumita Arora",
      category: "Computer", level: "Class 12",
      driveId: "1GfQlqmKH-t0F1o8FMPGKCLl_SgDOcq1b",

    }

  saveBooks();
}

function saveBooks() {
  localStorage.setItem('padhaiGharBooks', JSON.stringify(books));
}

// ─── EMOJI & COLOR DATA ──────────────────────────────────────────────────────

const emojis = ['📘','📗','📕','📙','📒','📚','📖','🔬','🔭','🧬','⚗️','🧪','📐','📏','🔢','➗','🏛️','🗺️','🌍','🏔️','💻','🖥️','⌨️','🤖','🚀','✈️','🔥','⚡','🌟','🎓','✏️','🖊️','📝','💡','🏆','🎯','🧠','📊'];

const coverColors = [
  '#0a2340','#0a2a1a','#2a1a0a','#1a0a2a','#2a0a0a','#0a2a2a',
  '#1a1a2a','#2a2a0a','#1a2a1a','#2a0a1a','#0a1a2a','#1a1a1a',
  '#2a1a1a','#0a2a2a','#1a2a2a','#2a2a1a'
];

// ─── RENDER EMOJIS ───────────────────────────────────────────────────────────

function initEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = emojis.map(e =>
    `<button class="emoji-btn ${e==='📘'?'selected':''}" onclick="selectEmoji('${e}',this)">${e}</button>`
  ).join('');
}

function selectEmoji(e, btn) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('f_emoji').value = e;
}

function initColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = coverColors.map((c, i) =>
    `<div class="color-swatch ${i===0?'selected':''}" style="background:${c}" onclick="selectColor('${c}',this)" title="${c}"></div>`
  ).join('');
}

function selectColor(c, el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('f_color').value = c;
}

// ─── FILTER ──────────────────────────────────────────────────────────────────

let activeFilter = 'All';

function renderFilterBar() {
  const categories = ['All', ...new Set(books.map(b => b.category).filter(Boolean))];
  document.getElementById('filterBar').innerHTML = categories.map(c =>
    `<button class="filter-tag ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(c) { activeFilter = c; renderFilterBar(); renderBooks(); }

// ─── RENDER BOOKS ────────────────────────────────────────────────────────────

let currentView = 'library';

function showView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderBooks();
}

function renderBooks() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let list = [...books];

  if (currentView === 'recent') {
    list.sort((a,b) => b.addedAt - a.addedAt);
    list = list.slice(0, 12);
  }

  if (activeFilter !== 'All') list = list.filter(b => b.category === activeFilter);

  if (query) {
    list = list.filter(b =>
      b.title.toLowerCase().includes(query) ||
      (b.author||'').toLowerCase().includes(query) ||
      (b.category||'').toLowerCase().includes(query)
    );
  }

  const grid = document.getElementById('bookGrid');
  const stats = document.getElementById('statsBar');
  stats.textContent = `${list.length} book${list.length !== 1 ? 'en' : ''} mili`;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">📭</div>
      <h3>Koi Book Nahi Mili</h3>
      <p>Apni search badlein ya nayi book add karein</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((b, i) => `
    <div class="book-card" style="animation-delay:${i*0.05}s" onclick="openReader(${b.id})">
      <div class="book-cover" style="background:${b.color||'#1a2a3a'}">
        <span style="z-index:1;position:relative">${b.emoji||'📘'}</span>
        ${b.badge ? `<div class="book-badge">${b.badge}</div>` : ''}
      </div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author || 'Unknown Author'}</div>
        <div class="book-meta">
          ${b.category ? `<span class="tag">${b.category}</span>` : ''}
          ${b.level ? `<span class="tag">${b.level}</span>` : ''}
        </div>
        <button class="read-btn" onclick="event.stopPropagation();openReader(${b.id})">📖 Padhna Shuru Karo</button>
      </div>
    </div>
  `).join('');
}

// ─── READER ──────────────────────────────────────────────────────────────────

function openReader(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;

  document.getElementById('readerTitle').textContent = b.title;
  document.getElementById('readerEmoji').textContent = b.emoji || '📖';
  document.getElementById('readerModal').classList.add('open');

  const body = document.getElementById('readerBody');

  // Extract file ID from various Google Drive URL formats
  let fileId = b.driveId;
  const match = (b.driveLink||'').match(/\/d\/(.*?)(\/|$)/);
  if (match) fileId = match[1];

  if (!fileId || fileId.length < 10) {
    body.innerHTML = `<div class="iframe-placeholder">
      <div class="icon">⚠️</div>
      <p style="color:var(--muted)">Valid Google Drive link nahi mila.</p>
      <p style="color:var(--muted);font-size:0.8rem">Admin panel mein sahi link daalein.</p>
    </div>`;
    return;
  }

  body.innerHTML = `<iframe
    src="https://drive.google.com/file/d/${fileId}/preview"
    width="100%" height="100%"
    allow="autoplay"
    allowfullscreen
    style="border:none;display:block;width:100%;height:100%"
  ></iframe>`;
}

function closeReader() {
  document.getElementById('readerModal').classList.remove('open');
  document.getElementById('readerBody').innerHTML = '';
}

// ─── ADMIN ───────────────────────────────────────────────────────────────────

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('open');
  initEmojiGrid();
  initColorGrid();
  renderAdminList();
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('open');
  clearForm();
}

function clearForm() {
  ['f_title','f_author','f_link','f_badge'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_category').value = '';
  document.getElementById('f_level').value = '';
  document.getElementById('f_emoji').value = '📘';
  document.getElementById('f_color').value = '#1a2a4a';
}

function addBook() {
  const title = document.getElementById('f_title').value.trim();
  const link  = document.getElementById('f_link').value.trim();
  const category = document.getElementById('f_category').value;

  if (!title) return showToast('❌ Title zaruri hai!');
  if (!link)  return showToast('❌ Drive link zaruri hai!');
  if (!category) return showToast('❌ Category chunein!');

  // Extract Drive file ID
  let fileId = '';
  const patterns = [
    /\/d\/([a-zA-Z0-9_-]{25,})/,
    /id=([a-zA-Z0-9_-]{25,})/,
    /^([a-zA-Z0-9_-]{25,})$/
  ];
  for (const p of patterns) {
    const m = link.match(p);
    if (m) { fileId = m[1]; break; }
  }

  if (!fileId) return showToast('❌ Valid Drive link nahi mila!');

  const newBook = {
    id: Date.now(),
    title,
    author: document.getElementById('f_author').value.trim(),
    category,
    level: document.getElementById('f_level').value,
    driveId: fileId,
    driveLink: link,
    emoji: document.getElementById('f_emoji').value || '📘',
    color: document.getElementById('f_color').value || '#1a2a4a',
    badge: document.getElementById('f_badge').value.trim().toUpperCase(),
    addedAt: Date.now()
  };

  books.unshift(newBook);
  saveBooks();
  clearForm();
  renderBooks();
  renderFilterBar();
  renderAdminList();
  showToast('✅ Book publish ho gayi!');
}

function deleteBook(id) {
  if (!confirm('Kya aap yeh book delete karna chahte hain?')) return;
  books = books.filter(b => b.id !== id);
  saveBooks();
  renderBooks();
  renderFilterBar();
  renderAdminList();
  showToast('🗑️ Book delete ho gayi');
}

function renderAdminList() {
  const list = document.getElementById('adminBookList');
  document.getElementById('bookCountLabel').textContent = books.length;

  if (books.length === 0) {
    list.innerHTML = `<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:1rem">Abhi koi book nahi hai.</p>`;
    return;
  }

  list.innerHTML = books.map(b => `
    <div class="book-list-item">
      <div class="book-list-emoji">${b.emoji}</div>
      <div class="book-list-info">
        <div class="book-list-title">${b.title}</div>
        <div class="book-list-sub">${b.category || '—'} · ${b.level || 'General'}</div>
      </div>
      <button class="delete-btn" onclick="deleteBook(${b.id})">🗑</button>
    </div>
  `).join('');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── CLOSE ON OVERLAY CLICK ──────────────────────────────────────────────────

document.getElementById('readerModal').addEventListener('click', function(e) {
  if (e.target === this) closeReader();
});

document.getElementById('adminOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAdmin();
});

// ─── INIT ────────────────────────────────────────────────────────────────────

renderFilterBar();
renderBooks();
</script>
</body>
</html>
